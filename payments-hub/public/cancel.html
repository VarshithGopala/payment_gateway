<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Cancelled</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #172033;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #dbe1ea;
        border-radius: 8px;
        padding: 32px;
      }
      p {
        color: #4d5b73;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Checkout cancelled</h1>
      <p>You can return to the merchant website and try again.</p>
    </main>
  </body>
</html>
